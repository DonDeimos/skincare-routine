<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1a1a18"/>
  
  <!-- Neck -->
  <rect x="210" y="340" width="92" height="80" rx="10" fill="#8B5E3C"/>
  
  <!-- Head -->
  <ellipse cx="256" cy="210" rx="110" ry="125" fill="#8B5E3C"/>
  
  <!-- Hair -->
  <ellipse cx="256" cy="105" rx="110" ry="50" fill="#1a1008"/>
  <rect x="146" y="90" width="30" height="80" rx="15" fill="#1a1008"/>
  <rect x="336" y="90" width="30" height="80" rx="15" fill="#1a1008"/>
  <rect x="146" y="90" width="220" height="40" rx="10" fill="#1a1008"/>

  <!-- Ears -->
  <ellipse cx="148" cy="220" rx="18" ry="22" fill="#7a5234"/>
  <ellipse cx="364" cy="220" rx="18" ry="22" fill="#7a5234"/>

  <!-- Eyes -->
  <ellipse cx="210" cy="200" rx="18" ry="14" fill="#fff"/>
  <ellipse cx="302" cy="200" rx="18" ry="14" fill="#fff"/>
  <circle cx="213" cy="201" r="10" fill="#2a1a08"/>
  <circle cx="305" cy="201" r="10" fill="#2a1a08"/>
  <circle cx="216" cy="198" r="3" fill="#fff"/>
  <circle cx="308" cy="198" r="3" fill="#fff"/>

  <!-- Eyebrows -->
  <path d="M190 182 Q210 172 230 178" stroke="#1a1008" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M282 178 Q302 172 322 182" stroke="#1a1008" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="256" cy="238" rx="12" ry="8" fill="#7a5234"/>
  <path d="M244 238 Q256 252 268 238" stroke="#6a4428" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Mustache -->
  <path d="M220 268 Q256 278 292 268" stroke="#1a1008" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Full dark beard -->
  <path d="M155 270 Q148 320 160 360 Q200 410 256 415 Q312 410 352 360 Q364 320 357 270 Q320 285 256 288 Q192 285 155 270Z" fill="#1a1008"/>
  
  <!-- Beard texture highlights -->
  <path d="M190 300 Q200 340 210 370" stroke="#2a2010" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M256 295 Q256 345 256 380" stroke="#2a2010" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M320 300 Q310 340 300 370" stroke="#2a2010" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Cheek beard sides -->
  <ellipse cx="168" cy="255" rx="25" ry="30" fill="#1a1008"/>
  <ellipse cx="344" cy="255" rx="25" ry="30" fill="#1a1008"/>
</svg>